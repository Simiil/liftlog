name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint, unit tests, assemble
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      # Insurance for cold runners: harmless if licenses are already accepted
      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true
      - name: Ktlint, lint, unit tests, assemble
        run: ./gradlew ktlintCheck lint testDebugUnitTest assembleDebug

  instrumented:
    name: Instrumented tests (Room DAOs)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Free disk space for the emulator
        # The AVD needs a ~7.4 GB userdata partition; the runner's / has too little
        # free by default. Drop preinstalled toolchains we don't use (keeps the JDK
        # tool cache and the Android SDK intact, only removes the unused NDK).
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL /usr/local/lib/android/sdk/ndk
          sudo docker image prune --all --force || true
          df -h /
      - uses: gradle/actions/setup-gradle@v4
      # 01-architecture §8 named a Gradle-managed device (pixelApi34DebugAndroidTest),
      # but its snapshot emulator fails to boot on GitHub's headless runners. This is
      # the documented fallback: the emulator-runner action boots a headless ATD
      # emulator reliably and runs the standard connectedDebugAndroidTest task.
      - name: Run DAO + seeder tests on an emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: aosp_atd
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -camera-back none
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest

  release:
    name: Release AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only on main: PRs (esp. from forks) can't read the signing secrets.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      # Map secrets to env so the decode step can branch on their presence.
      # Until these four secrets are set the build still runs, debug-signed.
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true
      - name: Decode release keystore
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
      - name: Build release bundle (AAB)
        # Reads KEYSTORE_FILE (set above only when secrets exist); without it the
        # build.gradle release type falls back to debug signing.
        run: ./gradlew bundleRelease
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
